name: Release

# Builds glossa for Linux, macOS, and Windows, then publishes a GitHub Release
# with the packaged binaries whenever a version tag (e.g. v0.1.0) is pushed.
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: glossa-linux-x86_64.tar.gz
          - os: macos-latest
            asset_name: glossa-macos-aarch64.tar.gz
          - os: windows-latest
            asset_name: glossa-windows-x86_64.zip

    steps:
      - uses: actions/checkout@v4

      # iced (via winit) links against these at build time on Linux.
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release

      - name: Package (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: tar czf ${{ matrix.asset_name }} -C target/release glossa

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path target/release/glossa.exe -DestinationPath ${{ matrix.asset_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
